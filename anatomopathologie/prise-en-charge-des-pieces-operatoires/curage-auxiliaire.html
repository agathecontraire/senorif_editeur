<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Curage Auxiliaire — SENORIF</title><style>:root{--blue:#4c78b8;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--card:#f8fafc;--green:#16a34a}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:white;color:var(--text);line-height:1.65}main{max-width:980px;margin:0 auto;padding:38px 24px 70px}.back{display:inline-block;margin-bottom:28px;color:var(--blue);font-weight:800;text-decoration:none}.content{background:white;border-top:10px solid var(--blue);border-radius:20px;box-shadow:0 10px 28px rgba(31,50,90,.08);padding:34px}h1{color:var(--blue);font-size:34px;font-weight:500;margin:0 0 14px}h2{color:var(--blue);font-size:24px;font-weight:500;margin:0 0 22px}p,div,li,span{font-size:16px}p{margin:0 0 16px}ul{margin:0 0 18px 24px}.list{display:grid;gap:12px;margin-top:18px}.item{display:block;padding:16px 18px;border:1px solid var(--border);border-left:8px solid var(--blue);border-radius:14px;background:#f9fafb;color:var(--text);text-decoration:none;font-weight:800}img{max-width:100%;height:auto}table{width:100%;border-collapse:collapse;margin:18px 0;font-size:16px}th,td{border:1px solid #6b7280;padding:8px 10px;vertical-align:top;font-size:16px;line-height:1.45}th{font-weight:900;background:#f8fafc}.test-btn{border:0;border-radius:999px;background:var(--blue);color:white;padding:13px 20px;font-weight:900;cursor:pointer;margin:8px 0 22px}.quiz{margin:10px 0 30px;display:none}.quiz.active{display:block}.question-card{border:1px solid var(--border);border-left:8px solid var(--blue);border-radius:14px;background:var(--card);padding:18px;margin:14px 0}.question-card h3{font-size:18px;margin:0 0 8px;color:#111827}.help{color:var(--muted);font-size:14px;margin:0 0 12px}.choices{display:flex;flex-direction:column;gap:9px}.choice{border:1px solid var(--border);background:white;border-radius:10px;padding:12px 14px;font-weight:800;text-align:left;cursor:pointer}.choice:hover{border-color:var(--blue);background:#eef5ff}.choice.selected{background:#e8f1ff;border-color:var(--blue);color:#274f91}.result{border:1px solid #bbf7d0;border-left:8px solid var(--green);border-radius:14px;background:#f0fdf4;padding:20px;margin:16px 0 24px}.result h3{margin:0 0 10px;color:#166534}.note{margin-top:20px;padding:14px 16px;background:#f9fafb;border:1px solid var(--border);border-radius:12px;color:var(--muted);font-size:14px}@media(max-width:600px){main{padding:28px 18px 60px}.content{padding:24px}h1{font-size:28px}}</style></head><body><main><a class="back" href="index.html">← Retour</a><div class="content" style="--blue:#8E7CC3"><h1>Curage Auxiliaire</h1><p>Colle ici le texte.</p></div></main><script>
document.addEventListener("DOMContentLoaded",function(){
  document.querySelectorAll(".senorif-table[data-file]").forEach(function(holder){
    var file=holder.getAttribute("data-file");
    fetch(file+"?v="+Date.now())
      .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
      .then(function(data){
        var table=document.createElement("table");
        var tbody=document.createElement("tbody");

        if(data.colonnes && data.colonnes.length){
          var tr=document.createElement("tr");
          data.colonnes.forEach(function(c){
            var th=document.createElement("th");
            th.textContent=c;
            tr.appendChild(th);
          });
          tbody.appendChild(tr);
        }

        (data.lignes||[]).forEach(function(row){
          var tr=document.createElement("tr");
          row.forEach(function(c){
            var td=document.createElement("td");
            td.textContent=c;
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        holder.innerHTML="";
        holder.appendChild(table);
      })
      .catch(function(err){
        holder.innerHTML="<div class='note'>Tableau impossible à charger : "+err.message+"</div>";
      });
  });
});
</script></body></html>
