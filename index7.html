<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Éditeur SENORIF</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
:root{--blue:#4c78b8;--dark:#111827;--muted:#6b7280;--border:#e5e7eb;--bg:#f8fafc;--red:#dc2626}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--dark)}
header{min-height:64px;background:white;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;padding:10px 14px;position:sticky;top:0;z-index:10;flex-wrap:wrap}
header strong{color:var(--blue);font-size:18px}button{border:1px solid var(--border);background:white;border-radius:10px;padding:9px 12px;font-weight:800;cursor:pointer}
button:hover{background:#eef5ff}.primary{background:var(--blue);color:white;border-color:var(--blue)}.danger{color:var(--red)}
.layout{display:grid;grid-template-columns:335px 1fr 430px;height:calc(100vh - 64px)}aside,.right{background:white;overflow:auto;padding:14px}aside{border-right:1px solid var(--border)}.right{border-left:1px solid var(--border)}main{overflow:auto;padding:20px}
.help{background:#f9fafb;border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--muted);font-size:13px;line-height:1.45;margin-bottom:12px}.toolbar{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0}.small{font-size:12px;padding:6px 9px}
.tree ul{list-style:none;margin:0;padding-left:17px}.tree li{margin:4px 0}.node-btn{width:100%;text-align:left;border:1px solid transparent;background:transparent;padding:7px 8px;border-radius:8px;font-weight:700;display:flex;gap:6px;align-items:center}.node-btn:hover{background:#f3f6fb}.node-btn.selected{background:#e8f1ff;border-color:#bcd2ff;color:#244f9e}.badge{font-size:10px;font-weight:900;padding:2px 6px;border-radius:999px;background:#eef2ff;color:#4868a8;margin-left:auto}
.preview-card{max-width:900px;margin:0 auto;background:white;border-top:10px solid var(--blue);border-radius:22px;box-shadow:0 10px 30px rgba(31,50,90,.08);padding:34px}.preview-card h1{color:var(--blue);font-size:34px;font-weight:500;margin:0 0 12px}.preview-card h2{color:var(--blue);font-size:24px;font-weight:500;margin:0 0 18px}.preview-card .list{display:grid;gap:12px}.preview-card .item{display:block;padding:16px 18px;border:1px solid var(--border);border-left:8px solid var(--blue);border-radius:14px;background:#f9fafb;color:var(--dark);text-decoration:none;font-weight:800}.preview-card .content-html{line-height:1.7}.preview-card img{max-width:100%;height:auto}
label{display:block;font-size:13px;font-weight:900;margin:12px 0 6px}input,textarea,select{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px;font-family:inherit;font-size:14px}textarea{min-height:180px}.code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}.status{margin-top:10px;font-size:13px;color:var(--muted);white-space:pre-wrap}
.richbar{display:flex;gap:6px;flex-wrap:wrap;padding:8px;background:#f9fafb;border:1px solid var(--border);border-radius:12px 12px 0 0}.richbar button{padding:7px 10px;border-radius:8px}.editorbox{min-height:260px;border:1px solid var(--border);border-top:0;border-radius:0 0 12px 12px;padding:14px;background:white;line-height:1.65;overflow:auto}.editorbox:focus{outline:2px solid rgba(76,120,184,.25)}.tabs{display:flex;gap:6px;margin-top:8px}.tab{padding:7px 10px;font-size:12px}.tab.active{background:var(--blue);color:white}.hidden{display:none}
@media(max-width:950px){.layout{grid-template-columns:1fr;height:auto}aside,.right{border:0;border-bottom:1px solid var(--border)}}
</style>
</head>
<body>
<input id="imagePicker" type="file" accept="image/*" style="display:none" onchange="handleImagePicked(event)">
<header><strong>Éditeur SENORIF</strong><button onclick="newProject()">Nouveau</button><button onclick="autoLoadRepo(true)">Recharger dépôt GitHub</button><button onclick="saveLocal()">Sauver local</button><button onclick="loadLocal()">Recharger local</button><button class="primary" onclick="exportZip()">Exporter ZIP</button></header>
<div class="layout">
<aside><div class="help">Chargement automatique du dépôt GitHub où cet éditeur est hébergé. Si besoin, importe le ZIP du dépôt.</div><label>Importer le site existant</label><input type="file" id="importFile" accept=".zip,.json" onchange="importFile(event)"><div class="toolbar"><button class="small" onclick="addRoot()">+ Chapitre</button><button class="small" onclick="addChild('folder')">+ Dossier</button><button class="small" onclick="addChild('page')">+ Page</button><button class="small danger" onclick="deleteSelected()">Supprimer</button></div><h3>Structure</h3><div id="tree" class="tree"></div></aside>
<main><div id="preview" class="preview-card"></div></main>
<section class="right"><h3>Édition</h3><div id="editorEmpty" class="help">Sélectionne un élément.</div><div id="editor" style="display:none"><label>Type</label><select id="editType" onchange="updateSelectedMeta()"><option value="folder">Dossier / menu</option><option value="page">Page</option></select><label>Titre</label><input id="editTitle" oninput="updateSelectedMeta()"><label>Slug / nom du fichier ou dossier</label><input id="editSlug" oninput="updateSelectedMeta()"><label>Couleur</label><input id="editColor" type="color" oninput="updateSelectedMeta()"><div class="toolbar"><button onclick="moveSelected(-1)">↑ Monter</button><button onclick="moveSelected(1)">↓ Descendre</button></div><label>Contenu</label><div class="tabs"><button class="tab active" id="tabRich" onclick="showEditorMode('rich')">Éditeur normal</button><button class="tab" id="tabHtml" onclick="showEditorMode('html')">HTML</button></div><div id="richWrap"><div class="richbar"><button type="button" onclick="cmd('bold')"><b>Gras</b></button><button type="button" onclick="cmd('italic')"><i>Italique</i></button><button type="button" onclick="cmd('underline')"><u>Souligné</u></button><button type="button" onclick="cmd('insertUnorderedList')">• Liste</button><button type="button" onclick="cmd('insertOrderedList')">1. Liste</button><button type="button" onclick="makeHeading()">Titre</button><button type="button" onclick="insertImage()">Image</button></div><div id="richContent" class="editorbox" contenteditable="true" oninput="updateSelectedContentFromRich()"></div></div><textarea id="editContent" class="hidden" oninput="updateSelectedContentFromHtml()"></textarea><div class="help">Les modifications de l’éditeur normal sont exportées en HTML.</div></div><div id="status" class="status"></div></section>
</div>
<script>
let data=null,selectedId=null,assets={},suppress=false;const RESERVED_DIRS=new Set(["images","image","img","questionnaires","questionnaire","assets","css","js"]),RESERVED_FILES=new Set(["editeur.html","index-editeur.html","senorif-data.json"]);
const $=id=>document.getElementById(id);function uid(){return"n"+Math.random().toString(36).slice(2,9)}function slugify(s){return String(s||"page").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/œ/g,"oe").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"")||"page"}function esc(s){return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}function setStatus(s){$("status").textContent=s}function cleanPath(p){return p.replace(/^\/+/,"").replace(/\\/g,"/")}
function defaultData(){return{titre:"SENORIF interactif",sous_titre:"Cancers et pathologies du sein — navigation par chapitres",chapitres:[{id:uid(),titre:"Carcinome in situ (CIS)",slug:"carcinome-in-situ",type:"folder",color:"#C25D6F",enfants:[{id:uid(),titre:"Chirurgie",slug:"chirurgie",type:"folder",color:"#C25D6F",contenu_html:"<p>Texte introductif.</p>",enfants:[{id:uid(),titre:"Tumorectomie et lésions intracanalaires",slug:"tumorectomie-et-lesions-intracanalaires",type:"page",color:"#C25D6F",contenu_html:"<p>Colle ici le texte.</p>"}]}]}]}}function newProject(){if(confirm("Créer un projet exemple ?")){assets={};data=defaultData();selectedId=data.chapitres[0].id;render();setStatus("Projet exemple chargé.")}}
function titleFromSlug(slug){return slug.split("-").map(w=>w?w[0].toUpperCase()+w.slice(1):"").join(" ")}function parseHtmlInfo(html,fallback,isIndex=false){
const doc=new DOMParser().parseFromString(html,"text/html");
let content=doc.querySelector(".content")||doc.querySelector("main")||doc.body;
let h1=content.querySelector("h1")?.textContent?.trim();
let h2=content.querySelector("h2")?.textContent?.trim();
let h2Usable=h2 && h2.toLowerCase()!=="menu" && !h2.toLowerCase().includes("choisis une sous-partie");
let title=(isIndex?(h2Usable?h2:(h1||h2)):(h2Usable?h2:(h1||h2))||doc.querySelector("title")?.textContent||fallback||"Page").trim();
let clone=content.cloneNode(true);
clone.querySelectorAll("a.back,script,style").forEach(el=>el.remove());
let firstH1=clone.querySelector("h1"); if(firstH1) firstH1.remove();
let firstH2=clone.querySelector("h2"); if(firstH2 && firstH2.textContent.trim()===title) firstH2.remove();
return{titre:title,contenu_html:clone.innerHTML.trim()}
}function detectColorFromHtml(html){let m=html.match(/--blue\s*:\s*(#[0-9a-fA-F]{6})/)||html.match(/--accent\s*:\s*(#[0-9a-fA-F]{6})/);return m?m[1]:"#4c78b8"}function stripMenu(html){let t=document.createElement("div");t.innerHTML=html;t.querySelectorAll(".list,.item").forEach(e=>e.remove());Array.from(t.querySelectorAll("p")).forEach(p=>{if(p.textContent.toLowerCase().includes("choisis une sous-partie"))p.remove()});return t.innerHTML.trim()}
async function importFile(e){let file=e.target.files[0];if(!file)return;if(file.name.toLowerCase().endsWith(".zip"))return importZip(file);try{data=JSON.parse(await file.text());selectedId=data.chapitres[0]?.id||null;render();setStatus("JSON importé.")}catch(err){alert("JSON invalide : "+err.message)}}async function importZip(file){if(typeof JSZip==="undefined")return alert("JSZip non chargé.");setStatus("Lecture du ZIP...");let zip=await JSZip.loadAsync(file),files={};assets={};for(let [path,obj]of Object.entries(zip.files)){if(obj.dir)continue;let p=cleanPath(path),base=p.split("/").pop();if(RESERVED_FILES.has(base))continue;if(p.toLowerCase().endsWith(".html"))files[p]=await obj.async("string");else assets[p]=await obj.async("uint8array")}data=buildDataFromFiles(files);selectedId=data.chapitres[0]?.id||null;render();setStatus("ZIP importé : plan reconstruit.")}
function buildDataFromFiles(files){let root={children:{},files:{}};Object.keys(files).forEach(path=>{let parts=path.split("/");if(parts.length===1)return;if(RESERVED_DIRS.has(parts[0].toLowerCase()))return;let cur=root;for(let i=0;i<parts.length-1;i++){let d=parts[i];cur.children[d]=cur.children[d]||{children:{},files:{},slug:d};cur=cur.children[d]}cur.files[parts.at(-1)]=path});let colors=["#5570AE","#6FAE93","#9A88C1","#B6689D","#C25D6F","#9AAA8E","#394B83"];function folder(slug,dir,color){let ip=dir.files["index.html"],titre=titleFromSlug(slug),contenu="",c=color;if(ip){let info=parseHtmlInfo(files[ip],titre,true);titre=info.titre;c=detectColorFromHtml(files[ip])||color;contenu=stripMenu(info.contenu_html)}let node={id:uid(),titre,slug,type:"folder",color:c,contenu_html:contenu,enfants:[]};Object.keys(dir.children).sort().forEach(s=>{if(!RESERVED_DIRS.has(s.toLowerCase()))node.enfants.push(folder(s,dir.children[s],c))});Object.keys(dir.files).sort().forEach(file=>{if(file==="index.html"||!file.endsWith(".html"))return;let path=dir.files[file],ps=file.replace(/\.html$/i,""),info=parseHtmlInfo(files[path],titleFromSlug(ps),false);node.enfants.push({id:uid(),titre:(info.titre===titre?titleFromSlug(ps):info.titre),slug:ps,type:"page",color:detectColorFromHtml(files[path])||c,contenu_html:info.contenu_html})});return node}return{titre:"SENORIF interactif",sous_titre:"Cancers et pathologies du sein — navigation par chapitres",chapitres:Object.keys(root.children).sort().map((s,i)=>folder(s,root.children[s],colors[i%colors.length]))}}
async function autoLoadRepo(manual=false){let host=location.hostname;if(!host.endsWith("github.io")){if(manual)alert("Importe un ZIP si tu n’es pas sur GitHub Pages.");data=defaultData();selectedId=data.chapitres[0].id;render();return}let owner=host.split(".")[0],repo=location.pathname.split("/").filter(Boolean)[0];if(!owner||!repo){data=defaultData();selectedId=data.chapitres[0].id;render();return}setStatus("Chargement automatique du dépôt "+owner+"/"+repo+"...");let files={},assetUrls={};async function walk(path=""){let r=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`);if(!r.ok)throw new Error("GitHub API HTTP "+r.status);let arr=await r.json();for(let item of arr){if(item.type==="dir"){if(item.name!==".git")await walk(item.path)}else if(item.type==="file"){let p=item.path,base=p.split("/").pop();if(RESERVED_FILES.has(base))continue;if(p.toLowerCase().endsWith(".html"))files[p]=await(await fetch(item.download_url)).text();else if(p.includes("/"))assetUrls[p]=item.download_url}}}try{await walk("");data=buildDataFromFiles(files);assets={};for(let[p,u]of Object.entries(assetUrls)){try{assets[p]=new Uint8Array(await(await fetch(u)).arrayBuffer())}catch(e){}}selectedId=data.chapitres[0]?.id||null;render();setStatus("Dépôt chargé automatiquement. HTML : "+Object.keys(files).length)}catch(e){setStatus("Chargement auto impossible : "+e.message+"\\nImporte un ZIP.");data=defaultData();selectedId=data.chapitres[0].id;render()}}
function findNode(id,nodes=data.chapitres,parent=null){for(let i=0;i<nodes.length;i++){let n=nodes[i];if(n.id===id)return{node:n,parent,index:i,list:nodes};if(n.enfants){let f=findNode(id,n.enfants,n);if(f)return f}}return null}function renderTree(){function branch(nodes){let h="<ul>";nodes.forEach(n=>{let icon=n.type==="page"?"📄":"📁";h+=`<li><button class="node-btn ${selectedId===n.id?"selected":""}" onclick="selectNode('${n.id}')" ondblclick="selectNode('${n.id}');richContent.focus()"><span>${icon}</span><span>${esc(n.titre)}</span><span class="badge">${n.type}</span></button>`;if(n.enfants?.length)h+=branch(n.enfants);h+="</li>"});return h+"</ul>"}tree.innerHTML=branch(data.chapitres)}function selectNode(id){selectedId=id;render()}function renderEditor(){let f=selectedId?findNode(selectedId):null;editorEmpty.style.display=f?"none":"block";editor.style.display=f?"block":"none";if(!f)return;let n=f.node;suppress=true;editType.value=n.type||"page";editTitle.value=n.titre||"";editSlug.value=n.slug||"";editColor.value=n.color||"#4c78b8";richContent.innerHTML=n.contenu_html||"";editContent.value=n.contenu_html||"";if(window.jsonOut) jsonOut.value=JSON.stringify(data,null,2);suppress=false}
function updateSelectedMeta(){let f=findNode(selectedId);if(!f)return;let n=f.node;n.type=editType.value;n.titre=editTitle.value;n.slug=slugify(editSlug.value||n.titre);n.color=editColor.value;if(n.type==="folder"&&!n.enfants)n.enfants=[];render(false)}function updateSelectedContentFromRich(){if(suppress)return;let f=findNode(selectedId);if(!f)return;f.node.contenu_html=richContent.innerHTML;editContent.value=f.node.contenu_html;renderPreview();jsonOut.value=JSON.stringify(data,null,2)}function updateSelectedContentFromHtml(){if(suppress)return;let f=findNode(selectedId);if(!f)return;f.node.contenu_html=editContent.value;richContent.innerHTML=f.node.contenu_html;renderPreview();jsonOut.value=JSON.stringify(data,null,2)}
function renderPreview(){let f=selectedId?findNode(selectedId):null,p=preview;if(!f){p.innerHTML="<h1>SENORIF interactif</h1><p>Sélectionne un élément.</p>";return}let n=f.node;p.style.borderTopColor=n.color||"#4c78b8";p.style.setProperty("--blue",n.color||"#4c78b8");if(n.type==="folder"){let links=(n.enfants||[]).map(c=>`<a class="item" href="#">› ${esc(c.titre)}</a>`).join("");p.innerHTML=`<h1>${esc(n.titre)}</h1><div class="content-html">${n.contenu_html||""}</div><div class="list">${links||"<p>Aucune sous-partie.</p>"}</div>`}else p.innerHTML=`<h1>${esc(n.titre)}</h1><div class="content-html">${n.contenu_html||"<p>Page vide.</p>"}</div>`}function render(ed=true){renderTree();renderPreview();if(ed)renderEditor()}
function addRoot(){let n={id:uid(),titre:"Nouveau chapitre",slug:"nouveau-chapitre",type:"folder",color:"#4c78b8",enfants:[],contenu_html:""};data.chapitres.push(n);selectedId=n.id;render()}function addChild(type){let f=findNode(selectedId);if(!f)return alert("Sélectionne un élément.");let p=f.node;if(p.type==="page"){p.type="folder";p.enfants=[]}p.enfants=p.enfants||[];let t=type==="page"?"Nouvelle page":"Nouveau dossier";let n={id:uid(),titre:t,slug:slugify(t),type,color:p.color||"#4c78b8",contenu_html:type==="page"?"<p>Colle ici le texte.</p>":"",enfants:type==="folder"?[]:undefined};p.enfants.push(n);selectedId=n.id;render()}function deleteSelected(){let f=findNode(selectedId);if(!f)return;if(!confirm("Supprimer « "+f.node.titre+" » ?"))return;f.list.splice(f.index,1);selectedId=f.parent?f.parent.id:data.chapitres[0]?.id;render()}function moveSelected(d){let f=findNode(selectedId);if(!f)return;let ni=f.index+d;if(ni<0||ni>=f.list.length)return;let[it]=f.list.splice(f.index,1);f.list.splice(ni,0,it);render()}function saveLocal(){localStorage.setItem("senorif_editeur_data",JSON.stringify({data}));setStatus("Sauvegardé localement.")}function loadLocal(){let s=localStorage.getItem("senorif_editeur_data");if(!s)return alert("Aucune sauvegarde.");data=JSON.parse(s).data;selectedId=data.chapitres[0]?.id;render();setStatus("Rechargé.")}
function showEditorMode(mode){tabRich.classList.toggle("active",mode==="rich");tabHtml.classList.toggle("active",mode==="html");richWrap.classList.toggle("hidden",mode!=="rich");editContent.classList.toggle("hidden",mode!=="html")}function cmd(c){document.execCommand(c,false,null);richContent.focus();updateSelectedContentFromRich()}function makeHeading(){document.execCommand("formatBlock",false,"h2");richContent.focus();updateSelectedContentFromRich()}let savedImageRange=null;

function insertImage(){
  richContent.focus();
  const sel=window.getSelection();
  if(sel && sel.rangeCount>0){
    savedImageRange=sel.getRangeAt(0).cloneRange();
  }
  imagePicker.value="";
  imagePicker.click();
}

function extensionFromFile(file){
  const name=(file.name||"").toLowerCase();
  const ext=name.includes(".") ? name.split(".").pop() : "";
  if(["jpg","jpeg","png","webp","gif","svg"].includes(ext)) return ext;
  if(file.type==="image/png") return "png";
  if(file.type==="image/webp") return "webp";
  if(file.type==="image/gif") return "gif";
  if(file.type==="image/svg+xml") return "svg";
  return "jpeg";
}

function imageBaseForSelected(){
  const f=findNode(selectedId);
  if(!f) return "image";
  const n=f.node;
  const parts=nodePath(n);
  let base;
  if(n.type==="folder"){
    base=parts.join("_");
  }else{
    base=parts.join("_");
  }
  return slugify(base).replaceAll("-","_") || "image";
}

function relativePrefixForSelected(){
  const f=findNode(selectedId);
  if(!f) return "";
  const n=f.node;
  const parts=nodePath(n);
  const depth=n.type==="folder" ? parts.length : Math.max(0,parts.length-1);
  return depth===0 ? "" : "../".repeat(depth);
}

function uniqueImagePath(base,ext){
  let path="images/"+base+"."+ext;
  let i=2;
  while(assets[path]){
    path="images/"+base+"_"+i+"."+ext;
    i++;
  }
  return path;
}

async function handleImagePicked(event){
  const file=event.target.files[0];
  if(!file) return;
  const ext=extensionFromFile(file);
  const base=imageBaseForSelected();
  const imagePath=uniqueImagePath(base,ext);
  assets[imagePath]=new Uint8Array(await file.arrayBuffer());

  const relativeSrc=relativePrefixForSelected()+imagePath;
  const imgHtml='<img src="'+esc(relativeSrc)+'" alt="" style="max-width:100%;height:auto;">';

  richContent.focus();
  if(savedImageRange){
    const sel=window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedImageRange);
  }
  document.execCommand("insertHTML",false,imgHtml);
  savedImageRange=null;
  updateSelectedContentFromRich();
  setStatus("Image ajoutée : "+imagePath);
}
function nodePath(t,nodes=data.chapitres,parts=[]){for(let n of nodes){let cur=[...parts,n.slug];if(n.id===t.id)return cur;if(n.enfants){let p=nodePath(t,n.enfants,cur);if(p)return p}}return[]}function filePathFor(n){let p=nodePath(n);return n.type==="folder"?p.join("/")+"/index.html":p.slice(0,-1).join("/")+"/"+n.slug+".html"}function rel(d){return d===0?"":"../".repeat(d)}
function pageCss(){return`:root{--blue:#4c78b8;--text:#111827;--muted:#6b7280;--border:#e5e7eb}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:white;color:var(--text);line-height:1.65}main{max-width:900px;margin:0 auto;padding:38px 24px 70px}.back{display:inline-block;margin-bottom:28px;color:var(--blue);font-weight:800;text-decoration:none}.content{background:white;border-top:10px solid var(--blue);border-radius:20px;box-shadow:0 10px 28px rgba(31,50,90,.08);padding:34px}h1{color:var(--blue);font-size:34px;font-weight:500;margin:0 0 14px}h2{color:var(--blue);font-size:24px;font-weight:500;margin:0 0 22px}p{font-size:16px;margin:0 0 16px}ul{margin:0 0 18px 24px}.list{display:grid;gap:12px;margin-top:18px}.item{display:block;padding:16px 18px;border:1px solid var(--border);border-left:8px solid var(--blue);border-radius:14px;background:#f9fafb;color:var(--text);text-decoration:none;font-weight:800}img{max-width:100%;height:auto}@media(max-width:600px){main{padding:28px 18px 60px}.content{padding:24px}h1{font-size:28px}}`}function homeCss(){return`:root{--bg:#ffffff;--card:#c5d8e8;--text:#233044;--muted:#617086}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}.wrapper{max-width:1180px;margin:0 auto;padding:34px 22px 70px}header{text-align:center;margin-bottom:30px}h1{color:#4868a8;font-size:clamp(34px,5vw,58px);font-weight:900}.subtitle{color:#617086;font-size:17px;margin-top:8px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}.chapter summary{list-style:none;position:relative;width:100%;min-height:126px;border:0;border-radius:0 18px 18px 0;background:var(--card);color:#6d82a5;font-size:22px;font-weight:800;line-height:1.15;padding:18px 18px 18px 28px;cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(31,50,90,.06);overflow:hidden}.chapter summary::-webkit-details-marker{display:none}.chapter summary::before{content:"";position:absolute;left:0;top:0;bottom:0;width:24px;background:var(--accent)}.chapter[open] summary{background:color-mix(in srgb, var(--accent) 78%, white);color:white}.panel{background:color-mix(in srgb, var(--accent) 84%, #233044);color:white;border-radius:0 0 18px 18px;padding:28px 26px 32px;margin-top:10px;box-shadow:0 10px 24px rgba(31,50,90,.13)}.panel h2{font-size:26px;margin-bottom:18px;color:#eef5ff}.panel ul{list-style:none}.panel li{margin:8px 0}.subchapter-btn{color:#eef5ff;display:flex;gap:12px;text-align:left;font-size:17px;font-weight:800;padding:4px 0;text-decoration:none}.chev{font-size:23px;line-height:1;color:#d9e8ff}@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){.grid{grid-template-columns:1fr}}`}
function hrefForHome(ch,c){
  return ch.slug+"/"+(c.type==="folder" ? c.slug+"/index.html" : c.slug+".html");
}
function generateHome(){
  let b="";
  data.chapitres.forEach(ch=>{
    let items=(ch.enfants||[]).map(c=>`<li><a class="subchapter-btn" href="${hrefForHome(ch,c)}"><span class="chev">›</span><span>${esc(c.titre)}</span></a></li>`).join("");
    b+=`<details class="chapter" style="--accent:${ch.color||"#5570AE"}"><summary>${esc(ch.titre)}</summary><div class="panel"><h2>${esc(ch.titre)}</h2><ul>${items}</ul></div></details>`;
  });
  return`<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>${esc(data.titre)}</title><style>${homeCss()}</style></head><body>
<input id="imagePicker" type="file" accept="image/*" style="display:none" onchange="handleImagePicked(event)"><div class="wrapper"><header><h1>${esc(data.titre)}</h1><p class="subtitle">${esc(data.sous_titre||"")}</p></header><div class="grid">${b}</div></div></body></html>`;
}
function generatePageAt(n,depth){
  let back=n.type==="folder" ? "../".repeat(depth)+"index.html" : "index.html";
  let body="";
  if(n.type==="folder"){
    let items=(n.enfants||[]).map(c=>`<a class="item" href="${c.type==="folder"?c.slug+"/index.html":c.slug+".html"}">› ${esc(c.titre)}</a>`).join("");
    body=`${n.contenu_html||""}<div class="list">${items}</div>`;
  } else {
    body=n.contenu_html||"<p>Page vide.</p>";
  }
  return`<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>${esc(n.titre)} — SENORIF</title><style>${pageCss()}</style></head><body>
<input id="imagePicker" type="file" accept="image/*" style="display:none" onchange="handleImagePicked(event)"><main><a class="back" href="${back}">← Retour</a><div class="content" style="--blue:${n.color||"#4c78b8"}"><h1>${esc(n.titre)}</h1>${body}</div></main></body></html>`;
}
async function exportZip(){
  let zip=new JSZip();
  zip.file("index.html",generateHome());
  

  function addFolder(folder,pathParts){
    let folderPath=pathParts.join("/");
    zip.file(folderPath+"/index.html",generatePageAt(folder,pathParts.length));
    (folder.enfants||[]).forEach(child=>{
      if(child.type==="folder"){
        addFolder(child,pathParts.concat(child.slug));
      } else {
        zip.file(folderPath+"/"+child.slug+".html",generatePageAt(child,pathParts.length));
      }
    });
  }

  data.chapitres.forEach(ch=>{
    if(ch.type==="folder"){
      addFolder(ch,[ch.slug]);
    } else {
      zip.file(ch.slug+".html",generatePageAt(ch,0));
    }
  });

  for(let[p,buf] of Object.entries(assets)){
    zip.file(p,buf);
  }

  let blob=await zip.generateAsync({type:"blob"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="site-senorif-export.zip";
  a.click();
  URL.revokeObjectURL(a.href);
}
autoLoadRepo(false);
</script>
